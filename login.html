<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — My Novel World</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
  }
  .auth-logo {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 2rem;
    cursor: pointer;
  }
  .auth-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    text-align: center;
    margin-bottom: 0.4rem;
  }
  .auth-sub {
    font-size: 0.82rem;
    color: var(--text2);
    text-align: center;
    margin-bottom: 2rem;
  }
  .auth-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 3px;
    margin-bottom: 1.75rem;
  }
  .auth-tab {
    padding: 0.55rem;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--text2);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .auth-tab.active {
    background: var(--bg2);
    color: var(--gold);
    border: 1px solid var(--border2);
  }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .auth-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.25rem 0;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .auth-divider span {
    font-size: 0.72rem;
    color: var(--text3);
  }
  .btn-google {
    width: 100%;
    padding: 0.7rem;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 1.25rem;
  }
  .btn-google:hover { border-color: var(--border3); }
  .btn-submit {
    width: 100%;
    padding: 0.8rem;
    background: var(--gold);
    border: none;
    border-radius: var(--radius);
    color: var(--bg);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
  }
  .btn-submit:hover { background: var(--gold2); }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }
  .auth-error {
    background: rgba(139,38,53,0.12);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: #e08090;
    margin-bottom: 1rem;
    display: none;
  }
  .auth-success {
    background: rgba(58,138,90,0.12);
    border: 1px solid var(--green);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: #70c090;
    margin-bottom: 1rem;
    display: none;
    text-align: center;
  }
  .forgot-link {
    font-size: 0.75rem;
    color: var(--text3);
    text-align: right;
    display: block;
    margin-top: 0.4rem;
    cursor: pointer;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--gold); }
</style>
</head>
<body>

<!-- Ambient background -->
<div style="position:fixed;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(201,168,76,0.05) 0%,transparent 70%);pointer-events:none;z-index:0"></div>

<div class="auth-wrap">
  <div class="auth-card fade-up">

    <div class="auth-logo" onclick="location.href='/'">MY NOVEL WORLD</div>

    <h1 class="auth-title" id="auth-title">Welcome back</h1>
    <p class="auth-sub" id="auth-sub">Sign in to your reader account</p>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Join Free</button>
    </div>

    <!-- Error / Success messages -->
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <!-- Google OAuth -->
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="login-email" type="email" class="form-input" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="login-password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        <span class="forgot-link" onclick="forgotPassword()">Forgot password?</span>
      </div>
      <button class="btn-submit" id="btn-login" onclick="signIn()">Sign In</button>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="form-register">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="reg-username" type="text" class="form-input" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="reg-email" type="email" class="form-input" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="reg-password" type="password" class="form-input" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-register" onclick="register()">Create Account</button>
      <p style="font-size:.72rem;color:var(--text3);text-align:center;margin-top:1rem">
        By joining you agree to read amazing novels and enjoy every chapter.
      </p>
    </div>

  </div>
</div>

<script type="module">
import db from '/js/supabase.js';

// Check if already logged in
const { data: { session } } = await db.auth.getSession();
if (session) {
  const redir = new URLSearchParams(location.search).get('redirect') || '/';
  location.href = redir;
}

// Switch between sign in / register tabs
window.switchTab = (tab) => {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
  document.getElementById('auth-title').textContent = tab === 'login' ? 'Welcome back' : 'Join the library';
  document.getElementById('auth-sub').textContent = tab === 'login'
    ? 'Sign in to your reader account'
    : 'Create a free account to bookmark and track your reading';
  clearMessages();
};

// Auto-switch to register if URL has #register
if (location.hash === '#register') switchTab('register');

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}
function clearMessages() {
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait...' : btn.id === 'btn-login' ? 'Sign In' : 'Create Account';
}

// Sign in with email
window.signIn = async () => {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  setLoading('btn-login', true);
  const { error } = await db.auth.signInWithPassword({ email, password });
  setLoading('btn-login', false);

  if (error) { showError(error.message); return; }
  const redir = new URLSearchParams(location.search).get('redirect') || '/';
  location.href = redir;
};

// Register
window.register = async () => {
  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!username) { showError('Please choose a username.'); return; }
  if (!email)    { showError('Please enter your email.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

  // Check username taken
  const { data: existing } = await db.from('profiles').select('id').eq('username', username).single();
  if (existing) { showError('That username is already taken. Try another.'); return; }

  setLoading('btn-register', true);
  const { data, error } = await db.auth.signUp({ email, password });
  setLoading('btn-register', false);

  if (error) { showError(error.message); return; }

  // Update profile with chosen username
  if (data.user) {
    await db.from('profiles').update({ username }).eq('id', data.user.id);
  }

  showSuccess('Account created! Check your email to confirm, then sign in.');
};

// Google OAuth
window.signInGoogle = async () => {
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/' }
  });
  if (error) showError(error.message);
};

// Forgot password
window.forgotPassword = async () => {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showError('Enter your email above first, then click Forgot password.'); return; }
  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  if (error) { showError(error.message); return; }
  showSuccess('Password reset email sent! Check your inbox.');
};

// Allow Enter key to submit
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('form-login').classList.contains('active');
  if (loginActive) window.signIn();
  else window.register();
});
</script>
</body>
</html>
