<!doctype html>
<html lang="en">
  <head>
    <script>
      document.documentElement.classList.add("auth-pending");
    </script>
    <style>
      html {
        background: #0a0a0b;
      }
      .auth-pending body {
        visibility: hidden;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library — My Novel World</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      .lib-header {
        margin-bottom: 2.5rem;
      }
      .lib-header h1 {
        margin-top: 0.4rem;
      }

      /* ── Reading goals / streak card ── */
      .goal-card {
        padding: 1.75rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2rem;
        flex-wrap: wrap;
        margin-bottom: 3.5rem;
      }
      .goal-left {
        display: flex;
        align-items: center;
        gap: 1.25rem;
      }
      .streak-flame {
        font-size: 2.2rem;
        line-height: 1;
      }
      .streak-num {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        color: var(--gold);
        line-height: 1;
      }
      .streak-label {
        font-size: 0.6rem;
        color: var(--text3);
        font-family: "Cinzel", serif;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-top: 0.2rem;
      }
      .goal-progress-wrap {
        flex: 1;
        min-width: 220px;
      }
      .goal-progress-label {
        font-size: 0.78rem;
        color: var(--text2);
        margin-bottom: 0.5rem;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .goal-bar {
        height: 8px;
        background: var(--bg4);
        border-radius: 4px;
        overflow: hidden;
      }
      .goal-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--gold), var(--gold2));
        transition: width 0.3s;
        border-radius: 4px;
      }
      .goal-edit {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-shrink: 0;
      }
      .goal-edit .form-label {
        margin: 0;
        white-space: nowrap;
      }
      .goal-edit input {
        width: 64px;
        text-align: center;
        padding: 0.6rem;
      }

      /* ── Section headers ── */
      .lib-section {
        margin-bottom: 3.5rem;
      }
      .lib-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.25rem;
        padding-bottom: 0.85rem;
        border-bottom: 1px solid var(--border);
      }
      .lib-section-head h2 {
        font-family: "Cinzel", serif;
        font-size: 0.68rem;
        letter-spacing: 0.25em;
        color: var(--text3);
        text-transform: uppercase;
        font-weight: 400;
      }

      /* ── Continue reading ── */
      .continue-item {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        padding: 1rem 1.25rem;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .continue-item:hover {
        border-color: var(--gold);
      }
      .continue-cover {
        width: 46px;
        height: 64px;
        border-radius: 3px;
        overflow: hidden;
        background: var(--bg3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        color: var(--text3);
        flex-shrink: 0;
        border: 1px solid var(--border);
      }
      .continue-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .continue-info {
        flex: 1;
        min-width: 0;
      }
      .continue-book {
        font-size: 0.65rem;
        color: var(--gold);
        font-family: "Cinzel", serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
      }
      .continue-chapter {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.05rem;
        margin-bottom: 0.55rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mini-progress {
        height: 4px;
        background: var(--bg4);
        border-radius: 2px;
        overflow: hidden;
        max-width: 240px;
      }
      .mini-progress-fill {
        height: 100%;
        background: var(--gold);
      }
      .continue-pct {
        font-size: 0.68rem;
        color: var(--text3);
        margin-top: 0.35rem;
      }
      .continue-arrow {
        color: var(--text3);
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .continue-item:hover .continue-arrow {
        color: var(--gold);
        transform: translateX(4px);
      }

      /* ── Bookmarked books grid ── */
      .book-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1.5rem;
      }
      .book-cover {
        aspect-ratio: 2/3;
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--bg3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--text3);
        border: 1px solid var(--border);
        position: relative;
        margin-bottom: 0.6rem;
        transition: border-color 0.2s;
        cursor: pointer;
      }
      .book-cover:hover {
        border-color: var(--gold);
      }
      .book-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .book-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 1rem;
        margin-bottom: 0.2rem;
        cursor: pointer;
        line-height: 1.3;
      }
      .book-title:hover {
        color: var(--gold);
      }
      .book-genre {
        font-size: 0.68rem;
        color: var(--text3);
      }
      .unbookmark-btn {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(10, 10, 11, 0.75);
        border: 1px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e08090;
        cursor: pointer;
        transition: all 0.2s;
      }
      .unbookmark-btn:hover {
        background: rgba(139, 38, 53, 0.35);
        border-color: var(--red);
      }

      /* ── History ── */
      .history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 0.85rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
        flex-wrap: wrap;
      }
      .history-item:last-child {
        border-bottom: none;
      }
      .history-item .h-title {
        color: var(--text);
      }
      .history-item .h-title a {
        color: inherit;
        transition: color 0.2s;
      }
      .history-item .h-title a:hover {
        color: var(--gold);
      }
      .history-item .h-book {
        color: var(--text3);
      }
      .history-item .h-date {
        color: var(--text3);
        font-size: 0.72rem;
        white-space: nowrap;
      }

      @media (max-width: 768px) {
        .goal-card {
          flex-direction: column;
          align-items: stretch;
        }
        .goal-edit {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav" id="main-nav">
      <span class="nav-logo" onclick="location.href = '/'">MY NOVEL WORLD</span>
      <ul class="nav-links">
        <li><a href="/">Library</a></li>
        <li>
          <a href="/updates.html"
            >Updates<span class="nav-badge" id="updates-badge"></span
          ></a>
        </li>
        <li><a href="/reading-order.html">Reading Order</a></li>
        <li><a href="/qa.html">Q&A</a></li>
      </ul>
      <div id="nav-right" class="nav-right"></div>
    </nav>

    <div class="page">
      <div class="container">
        <div class="lib-header fade-up">
          <p class="eyebrow">My Library</p>
          <h1 class="section-title">
            Welcome back, <span id="lib-username">Reader</span>
          </h1>
        </div>

        <!-- Reading Goals & Streaks -->
        <div class="card goal-card fade-up">
          <div class="goal-left">
            <div class="streak-flame">🔥</div>
            <div>
              <div class="streak-num" id="streak-num">0</div>
              <div class="streak-label">Week Streak</div>
            </div>
          </div>
          <div class="goal-progress-wrap">
            <div class="goal-progress-label">
              <span>Weekly Reading Goal</span>
              <span id="goal-progress-text">0 of 3 chapters this week</span>
            </div>
            <div class="goal-bar">
              <div
                class="goal-bar-fill"
                id="goal-bar-fill"
                style="width: 0%"
              ></div>
            </div>
          </div>
          <div class="goal-edit">
            <label class="form-label">Target / week</label>
            <input
              id="goal-target-input"
              type="number"
              min="1"
              max="14"
              class="form-input"
              value="3"
            />
            <button class="btn btn-sm" onclick="saveGoalTarget()">Save</button>
          </div>
        </div>

        <!-- Continue Reading -->
        <div class="lib-section fade-up">
          <div class="lib-section-head"><h2>Continue Reading</h2></div>
          <div id="continue-list">
            <div class="empty">
              <div class="empty-icon">📖</div>
              <p>Loading...</p>
            </div>
          </div>
        </div>

        <!-- Bookmarked Novels -->
        <div class="lib-section fade-up">
          <div class="lib-section-head"><h2>Bookmarked Novels</h2></div>
          <div id="bookmarks-grid" class="book-grid">
            <div class="empty">
              <div class="empty-icon">🔖</div>
              <p>Loading...</p>
            </div>
          </div>
        </div>

        <!-- Reading History -->
        <div class="lib-section fade-up">
          <div class="lib-section-head"><h2>Recently Completed</h2></div>
          <div id="history-list">
            <div class="empty">
              <div class="empty-icon">✓</div>
              <p>Loading...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import db from "/js/supabase.js";
      import { requireAuth, toast } from "/js/app.js";

      if (!(await requireAuth())) throw new Error("Not authenticated");
      const { currentUser, currentProfile } = await import("/js/app.js");

      document.getElementById("lib-username").textContent =
        currentProfile?.username ?? currentUser.email;

      function emptyState(icon, html) {
        return `<div class="empty"><div class="empty-icon">${icon}</div><p>${html}</p></div>`;
      }

      function getWeekStart() {
        const now = new Date();
        const day = now.getDay(); // 0 = Sunday
        const diff = (day === 0 ? -6 : 1) - day; // days back to Monday
        const monday = new Date(now);
        monday.setDate(now.getDate() + diff);
        monday.setHours(0, 0, 0, 0);
        return monday;
      }

      // ── Reading Goals & Streak ──
      async function loadGoal() {
        let { data: goal, error } = await db
          .from("reading_goals")
          .select("*")
          .eq("user_id", currentUser.id)
          .single();

        if (!goal) {
          const { data: created, error: insertErr } = await db
            .from("reading_goals")
            .insert({
              user_id: currentUser.id,
              weekly_target: 3,
              current_streak: 0,
              longest_streak: 0,
            })
            .select()
            .single();
          if (insertErr) {
            console.error("Reading goal setup failed:", insertErr.message);
            renderGoal(null, 0);
            return;
          }
          goal = created;
        }

        const { count } = await db
          .from("reading_progress")
          .select("id", { count: "exact", head: true })
          .eq("user_id", currentUser.id)
          .eq("completed", true)
          .gte("updated_at", getWeekStart().toISOString());

        renderGoal(goal, count ?? 0);
      }

      function renderGoal(goal, weekCount) {
        // Graceful fallback instead of crashing if goal setup failed above
        if (!goal) {
          document.getElementById("streak-num").textContent = "\u2013";
          document.getElementById("goal-progress-text").textContent =
            "Couldn't load your goal \u2014 try refreshing";
          document.getElementById("goal-bar-fill").style.width = "0%";
          return;
        }
        const target = goal.weekly_target || 3;
        document.getElementById("streak-num").textContent =
          goal.current_streak ?? 0;
        document.getElementById("goal-target-input").value = target;
        document.getElementById("goal-progress-text").textContent =
          `${weekCount} of ${target} chapters this week`;
        document.getElementById("goal-bar-fill").style.width =
          Math.min(100, (weekCount / target) * 100) + "%";
      }

      window.saveGoalTarget = async () => {
        const val = parseInt(
          document.getElementById("goal-target-input").value,
        );
        if (!val || val < 1 || val > 14) {
          toast("Choose a target between 1 and 14", "error");
          return;
        }
        const { error } = await db
          .from("reading_goals")
          .upsert(
            { user_id: currentUser.id, weekly_target: val },
            { onConflict: "user_id" },
          );
        if (error) {
          toast("Error: " + error.message, "error");
          return;
        }
        toast("Weekly goal updated", "success");
        loadGoal();
      };

      // ── Continue Reading ──
      async function loadContinue() {
        const { data } = await db
          .from("reading_progress")
          .select(
            "chapter_id, scroll_percent, updated_at, chapters(id, title, volumes(id, title, books(id, title, cover_url, color, symbol)))",
          )
          .eq("user_id", currentUser.id)
          .eq("completed", false)
          .gt("scroll_percent", 0)
          .order("updated_at", { ascending: false })
          .limit(8);

        const list = (data || []).filter((p) => p.chapters);
        const el = document.getElementById("continue-list");

        if (!list.length) {
          el.innerHTML = emptyState(
            "📖",
            `Nothing in progress. <a href="/" class="text-gold">Browse novels</a> to start reading.`,
          );
          return;
        }

        el.innerHTML = list
          .map((p) => {
            const ch = p.chapters,
              book = ch.volumes?.books;
            const pct = Math.round(p.scroll_percent);
            return `
    <div class="continue-item" onclick="location.href='/chapter.html?id=${ch.id}'">
      <div class="continue-cover" style="background:${book?.color || "#111114"}">
        ${book?.cover_url ? `<img src="${book.cover_url}">` : book?.symbol || "✦"}
      </div>
      <div class="continue-info">
        <div class="continue-book">${book?.title ?? ""}</div>
        <div class="continue-chapter">${ch.title}</div>
        <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
        <div class="continue-pct">${pct}% complete</div>
      </div>
      <div class="continue-arrow">→</div>
    </div>`;
          })
          .join("");
      }

      // ── Bookmarked Novels ──
      async function loadBookmarks() {
        const { data, error } = await db
          .from("bookmarks")
          .select(
            "id, created_at, books(id, title, genre, cover_url, color, symbol, published)",
          )
          .eq("user_id", currentUser.id)
          .order("created_at", { ascending: false });

        if (error) console.error("loadBookmarks failed:", error.message);
        const list = (data || []).filter((b) => b.books?.published);
        renderBookmarks(list);
      }

      function renderBookmarks(list) {
        const el = document.getElementById("bookmarks-grid");
        if (!list.length) {
          el.innerHTML = emptyState(
            "🔖",
            `No bookmarked novels yet. <a href="/" class="text-gold">Browse the library</a> to save one.`,
          );
          return;
        }
        el.innerHTML = list
          .map((b) => {
            const book = b.books;
            return `
    <div class="book-card">
      <div class="book-cover" style="background:${book.color || "#111114"}" onclick="location.href='/book.html?id=${book.id}'">
        ${book.cover_url ? `<img src="${book.cover_url}">` : book.symbol || "✦"}
        <button class="unbookmark-btn" onclick="event.stopPropagation();removeBookmark('${book.id}')" title="Remove bookmark">
          <i class="ti ti-heart-filled"></i>
        </button>
      </div>
      <div class="book-title" onclick="location.href='/book.html?id=${book.id}'">${book.title}</div>
      <div class="book-genre">${book.genre ?? ""}</div>
    </div>`;
          })
          .join("");
      }

      window.removeBookmark = async (bookId) => {
        const { error } = await db
          .from("bookmarks")
          .delete()
          .eq("user_id", currentUser.id)
          .eq("book_id", bookId);
        if (error) {
          console.error("Bookmark delete failed:", error.message);
          toast("Error: " + error.message, "error");
          return;
        }
        toast("Removed from bookmarks");
        loadBookmarks();
      };

      // ── Reading History ──
      async function loadHistory() {
        const { data } = await db
          .from("reading_progress")
          .select(
            "chapter_id, updated_at, chapters(id, title, volumes(title, books(id, title)))",
          )
          .eq("user_id", currentUser.id)
          .eq("completed", true)
          .order("updated_at", { ascending: false })
          .limit(6);

        const list = (data || []).filter((p) => p.chapters);
        const el = document.getElementById("history-list");

        if (!list.length) {
          el.innerHTML = emptyState("✓", "No completed chapters yet.");
          return;
        }

        el.innerHTML = list
          .map((p) => {
            const ch = p.chapters,
              book = ch.volumes?.books;
            return `
    <div class="history-item">
      <div class="h-title">
        <a href="/chapter.html?id=${ch.id}">${ch.title}</a>
        <span class="h-book"> — ${book?.title ?? ""}</span>
      </div>
      <span class="h-date">${new Date(p.updated_at).toLocaleDateString()}</span>
    </div>`;
          })
          .join("");
      }

      loadGoal();
      loadContinue();
      loadBookmarks();
      loadHistory();
    </script>
  </body>
</html>
